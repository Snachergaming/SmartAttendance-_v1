; PlatformIO Project Configuration File
; ATTENDRO Fingerprint Attendance Device
; ESP32 + R307/AS608 Fingerprint Sensor + OLED Display

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries
lib_deps =
    adafruit/Adafruit Fingerprint Sensor Library@^2.1.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    bblanchon/ArduinoJson@^6.21.3
    arduino-libraries/NTPClient@^3.2.1

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

; Extra scripts for WiFi credentials (optional)
; extra_scripts = pre:scripts/secrets.py
